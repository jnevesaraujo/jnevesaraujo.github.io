<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joana Araújo</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@docsearch/css@3">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="css/main.css" rel="stylesheet">
  <link href="css/watercolor.css" rel="stylesheet">
  <link href="css/responsive.css" rel="stylesheet">

</head>
<body>

<!-- Loading Overlay -->
<div id="loadingOverlay">
  <div class="spinner-border text-light" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
</div>
<!-- Toggle button for mobile (only shows on mobile) -->
<button class="navbar-toggler d-md-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar" aria-controls="sidebar">
  <span class="navbar-toggler-icon"></span>
</button>

<!-- Sidebar (always visible on desktop, offcanvas on mobile) -->
<div id="sidebar" class="offcanvas offcanvas-start offcanvas-md" tabindex="-1">
  <div class="offcanvas-header d-md-none">
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  
  <div class="d-flex flex-column justify-content-center flex-grow-1">
    <div class="offcanvas-body d-flex flex-column p-3">
      <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item mb-2">
          <a class="nav-link active" data-page="home" data-bs-dismiss="offcanvas">
            <i class="bi bi-house-fill"></i> Home
          </a>
        </li>
        <li class="nav-item mb-2">
          <a class="nav-link" data-page="work" data-bs-dismiss="offcanvas">
            <i class="bi bi-tools"></i> Work
          </a>
        </li>
        <li class="nav-item mb-2">
          <a class="nav-link" data-page="about" data-bs-dismiss="offcanvas">
            <i class="bi bi-person-arms-up"></i> About
          </a>
        </li>
      </ul>
    </div>
  </div>
  <div id="lang-switcher" class="btn-group dropup w-25 mx-2 my-2">
    <button id="current-lang-button" type="button" class="btn btn-lang dropdown-toggle" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
        <img id="current-lang-flag" src="https://flagcdn.com/pt.svg" alt="Português"> 
    </button>
    <div class="dropdown-menu">
        <a class="dropdown-item lang-option" href="#" data-lang="pt" data-bs-dismiss="offcanvas"> 
            <img src="https://flagcdn.com/pt.svg" alt="Português"> Português
        </a>
        <a class="dropdown-item lang-option" href="#" data-lang="en" data-bs-dismiss="offcanvas"> 
            <img src="https://flagcdn.com/gb.svg" alt="English"> English
        </a>
    </div>
  </div>
</div>

  </div>
  <!-- Carousel -->
   <div id="content-container">
        <!-- Content will be loaded here -->
    </div>

<!-- View Individuals Projects  -->
<div class="modal fade" id="projectModal" data-bs-theme="dark">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title text-white"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-white"></div>
        </div>
    </div>
</div>
</div>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <!-- Bootstrap JS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
<!--   <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script> -->
  <!-- RoughEase, ExpoScaleEase and SlowMo are all included in the EasePack file -->    
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/EasePack.min.js"></script>
  <script src="js/portfolio.js" type="module"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <script src="js/watercolor.js"></script>

</body>
</html>
